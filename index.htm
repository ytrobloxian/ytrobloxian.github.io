<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat & Math AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="auth-box" class="container">
        <h2>Join Global Chat</h2>
        <input type="text" id="username" placeholder="Choose Username">
        <button onclick="login()">Start Chatting</button>
    </div>

    <div id="chat-box-container" class="container" style="display:none;">
        <div class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="user-img" width="50">
            <h3 id="current-user">User</h3>
        </div>

        <div id="messages"></div>

        <div class="input-row">
            <input type="text" id="message-input" placeholder="Type a message or 'math: 2+2'...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
